<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descoberta do Produto — A Base da Riqueza</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #07080c;
    --bg2:      #0d0f16;
    --bg3:      #13161f;
    --navy:     #1b3a6b;
    --teal:     #1b6b5a;
    --gold:     #c8952a;
    --gold2:    #e8b84b;
    --cream:    #f5f0e8;
    --muted:    #8a8070;
    --border:   rgba(200,149,42,0.18);
    --radius:   12px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 50%, rgba(27,58,107,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 85% 20%, rgba(200,149,42,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 90% 80%, rgba(27,107,90,0.04) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

  .header { text-align: center; padding: 48px 0 56px; }
  .header-brand {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: .32em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 24px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .header-brand::before, .header-brand::after {
    content: ''; display: block; width: 32px; height: 1px; background: var(--gold); opacity: .5;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400; line-height: 1.15;
    color: var(--cream); margin-bottom: 16px;
  }
  .header h1 em { font-style: italic; color: var(--gold2); }
  .header p {
    font-size: 15px; color: var(--muted); line-height: 1.7; max-width: 540px; margin: 0 auto;
  }

  .progress-wrap {
    margin-bottom: 40px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 999px; overflow: hidden; height: 4px;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(to right, var(--navy), var(--gold));
    border-radius: 999px; transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label {
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--muted); text-align: right; margin-bottom: 8px;
  }

  .phase-indicator {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap;
  }
  .phase-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); padding: 6px 14px;
    border: 1px solid transparent; border-radius: 999px;
    transition: all .3s;
  }
  .phase-dot.active { color: var(--gold); border-color: var(--border); background: rgba(200,149,42,.06); }
  .phase-dot.done   { color: rgba(200,149,42,.45); }
  .phase-dot .dot   { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp .4s ease both;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(to bottom, var(--gold), transparent);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-step {
    font-size: 10px; font-weight: 500; letter-spacing: .28em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 12px; opacity: .8;
  }
  .card-question {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.45rem);
    font-weight: 400; line-height: 1.4;
    color: var(--cream); margin-bottom: 8px;
  }
  .card-hint {
    font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 24px;
  }

  textarea, input[type=text] {
    width: 100%; background: var(--bg3);
    border: 1px solid rgba(200,149,42,.2);
    border-radius: 8px; color: var(--cream);
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 300;
    padding: 14px 16px; resize: none; outline: none;
    transition: border-color .2s, box-shadow .2s;
    line-height: 1.6;
  }
  textarea:focus, input[type=text]:focus {
    border-color: rgba(200,149,42,.55);
    box-shadow: 0 0 0 3px rgba(200,149,42,.07);
  }
  textarea::placeholder, input::placeholder { color: var(--muted); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .chip {
    padding: 7px 16px; border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 13px; color: var(--muted);
    cursor: pointer; transition: all .2s; user-select: none;
    background: transparent;
  }
  .chip:hover  { border-color: var(--gold); color: var(--cream); }
  .chip.active { border-color: var(--gold); color: var(--gold); background: rgba(200,149,42,.08); }

  .scale { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .scale-btn {
    width: 46px; height: 46px; border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: 'Playfair Display', serif; font-size: 18px;
    cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center;
  }
  .scale-btn:hover  { border-color: var(--gold); color: var(--cream); }
  .scale-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(200,149,42,.1); }
  .scale-label { font-size: 12px; color: var(--muted); margin-left: 8px; }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; gap: 12px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 28px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: .04em; cursor: pointer; transition: all .2s; border: none;
  }
  .btn-primary { background: var(--gold); color: var(--bg); }
  .btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--cream); border-color: rgba(200,149,42,.4); }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .thinking {
    display: flex; align-items: center; gap: 14px;
    padding: 20px 24px; border-radius: var(--radius);
    background: var(--bg3); border: 1px solid var(--border);
    margin-bottom: 24px; animation: fadeUp .3s ease both;
  }
  .thinking-dots { display: flex; gap: 5px; }
  .thinking-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold); opacity: .4;
    animation: pulse 1.2s infinite ease-in-out;
  }
  .thinking-dot:nth-child(2) { animation-delay: .2s; }
  .thinking-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
  .thinking-text { font-size: 14px; color: var(--muted); font-style: italic; }

  .result-section {
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg2); overflow: hidden;
    margin-bottom: 20px; animation: fadeUp .4s ease both;
  }
  .result-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .result-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(200,149,42,.12); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px; color: var(--cream);
  }
  .result-body { padding: 20px 24px; font-size: 14px; line-height: 1.8; color: #b8b0a0; }
  .result-body strong { color: var(--cream); font-weight: 500; }
  .result-body ul { padding-left: 16px; margin-top: 8px; }
  .result-body li { margin-bottom: 6px; }
  .result-body .tag {
    display: inline-block; padding: 2px 10px;
    border-radius: 999px; border: 1px solid var(--border);
    font-size: 12px; color: var(--gold); margin: 3px 3px 3px 0;
    background: rgba(200,149,42,.06);
  }

  .copy-btn {
    display: flex; align-items: center; gap: 6px;
    margin-top: 12px; padding: 8px 16px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--muted);
    font-size: 12px; letter-spacing: .06em;
    cursor: pointer; transition: all .2s;
  }
  .copy-btn:hover { color: var(--cream); border-color: rgba(200,149,42,.4); }

  .final-cta {
    text-align: center; padding: 48px 24px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    margin-top: 32px; animation: fadeUp .5s .2s ease both; opacity: 0;
    animation-fill-mode: forwards;
  }
  .final-cta h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    color: var(--cream); margin-bottom: 12px;
  }
  .final-cta p { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.7; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(200,149,42,.2); border-radius: 3px; }

  @media (max-width: 600px) {
    .card { padding: 24px 20px; }
    .nav  { flex-direction: column-reverse; }
    .btn  { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="header" id="header">
    <div class="header-brand">A Base da Riqueza</div>
    <h1>Descubra o seu<br><em>produto ou serviço</em></h1>
    <p>Um assistente guiado que te ajuda a identificar o que você sabe, para quem serve e como transformar isso em produto, infoproduto ou serviço.</p>
  </div>

  <div id="main"></div>

</div>

<script>
const state = {
  phase: 0,
  step:  0,
  answers: {},
  result: null,
};

const phases = [
  { id: "trajetoria", label: "Trajetória" },
  { id: "autoridade", label: "Autoridade"  },
  { id: "publico",    label: "Público"     },
  { id: "formato",    label: "Formato"     },
  { id: "resultado",  label: "Resultado"   },
];

const steps = [
  {
    phase: 0, id: "nome",
    type: "text",
    question: "Qual é o seu nome?",
    hint: "Como você prefere ser chamado aqui.",
    placeholder: "Seu nome ou como prefere ser chamado",
    key: "nome",
  },
  {
    phase: 0, id: "area",
    type: "chips_text",
    question: "Em que área você atua ou atuou?",
    hint: "Pode ser uma área profissional, um setor, um estilo de vida — qualquer coisa onde você acumulou experiência.",
    chips: ["Negócios / Vendas","Finanças","Direito","Saúde / Bem-estar","Educação","Marketing / Conteúdo","Tecnologia","Imóveis","Moda / Beleza","Arte / Criação","Gastronomia","Esportes","Família / Relacionamentos","Outro"],
    placeholder: "Ou descreva com suas palavras...",
    key: "area",
  },
  {
    phase: 0, id: "conquista",
    type: "textarea",
    question: "Qual é a maior conquista da sua trajetória — aquela que você se orgulha de ter feito?",
    hint: "Pode ser profissional, pessoal, financeira, de saúde, de relacionamento. Não precisa ser grandiosa para os outros — só precisa ser real para você.",
    placeholder: "Escreva livremente. Quanto mais detalhes, melhor a análise.",
    key: "conquista", rows: 4,
  },
  {
    phase: 0, id: "transformacao",
    type: "textarea",
    question: "Que situação difícil você virou? Qual problema você já resolveu que outros ainda enfrentam?",
    hint: "Pense nas dores que você já superou: uma dívida, um negócio que faliu e você reconstruiu, um relacionamento, um processo que você otimizou, um medo que você venceu.",
    placeholder: "Ex: saí de dívidas, reorganizei minha empresa, aprendi a investir do zero, construí uma sociedade funcional...",
    key: "transformacao", rows: 4,
  },
  {
    phase: 1, id: "sabe",
    type: "textarea",
    question: "O que você sabe fazer bem — que outras pessoas te pedem ajuda ou conselho?",
    hint: "Pode ser uma habilidade técnica, um processo, uma forma de pensar, um método que você desenvolveu. O que as pessoas te ligam para perguntar?",
    placeholder: "Liste tudo que vier à cabeça. Pode ser várias coisas diferentes.",
    key: "sabe", rows: 4,
  },
  {
    phase: 1, id: "nivel",
    type: "scale",
    question: "Comparado às pessoas ao seu redor, qual é o seu nível nesse conhecimento?",
    hint: "Seja honesto — não é sobre humildade, é sobre posicionamento.",
    labels: ["Iniciante","Intermediário","Avançado","Especialista","Referência"],
    key: "nivel",
  },
  {
    phase: 1, id: "resultado",
    type: "textarea",
    question: "Que resultados concretos você ou quem você ajudou já obtiveram com esse conhecimento?",
    hint: "Números, casos reais, histórias. Resultados são a sua maior prova de autoridade.",
    placeholder: "Ex: faturei R$X, economizei X horas, ajudei 3 empresas a..., minha cliente saiu de dívidas em 6 meses...",
    key: "resultado_concreto", rows: 3,
  },
  {
    phase: 2, id: "quem_aprende",
    type: "textarea",
    question: "Quem são as pessoas que precisam do que você sabe — e que querem aprender com você?",
    hint: "Descreva quem são: idade, profissão, momento de vida, dores específicas. Quanto mais específico, mais poderoso o produto.",
    placeholder: "Ex: donos de pequenas empresas que faturam mas não conseguem guardar dinheiro, advogados iniciantes que querem abrir escritório...",
    key: "quem_aprende", rows: 4,
  },
  {
    phase: 2, id: "quem_chegar",
    type: "textarea",
    question: "Existe alguém que quer chegar onde você chegou — e precisa de um atalho?",
    hint: "Pense em quem olha para a sua trajetória e diz: 'quero isso'. Qual parte do caminho que você fez poderia encurtar para alguém?",
    placeholder: "Ex: quem quer sair do CLT, quem quer ter o primeiro imóvel, quem quer montar sociedade sem conflito...",
    key: "quem_chegar", rows: 3,
  },
  {
    phase: 2, id: "quem_contratar",
    type: "textarea",
    question: "Quem contrataria você como prestador de serviço — pelo que você sabe fazer?",
    hint: "Às vezes a melhor oferta não é ensinar, mas fazer. Quem pagaria para ter você resolvendo um problema por eles?",
    placeholder: "Ex: empresas que precisam de assessoria jurídica, empreendedores que precisam de alguém para estruturar financeiro...",
    key: "quem_contratar", rows: 3,
  },
  {
    phase: 3, id: "formato_pref",
    type: "chips_multi",
    question: "Como você prefere entregar o seu conhecimento?",
    hint: "Selecione todos os formatos que fazem sentido para você — considerando seu perfil e o que você conseguiria manter.",
    chips: ["Curso online gravado","Mentoria individual","Consultoria","Grupo de mentoria","Comunidade paga","Workshop / aula ao vivo","Palestra","E-book ou material escrito","Planilha / ferramenta","Podcast ou vídeo","Serviço feito por mim","Programa estruturado"],
    key: "formatos",
  },
  {
    phase: 3, id: "tempo",
    type: "chips",
    question: "Quanto tempo por semana você consegue dedicar à entrega desse produto?",
    hint: "Seja realista — é melhor começar pequeno e consistente do que grande e insustentável.",
    chips: ["Até 2h / semana","2–5h / semana","5–10h / semana","10–20h / semana","Dedicação integral"],
    key: "tempo",
  },
  {
    phase: 3, id: "preco",
    type: "chips",
    question: "Em qual faixa de preço você imagina o seu produto ou serviço?",
    hint: "Não existe certo ou errado — cada faixa serve uma estratégia diferente.",
    chips: ["Até R$ 97","R$ 97–297","R$ 297–997","R$ 997–3.000","R$ 3.000–10.000","Acima de R$ 10.000"],
    key: "preco",
  },
];

function currentStep() { return steps[state.step]; }
const totalSteps = steps.length;

function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  if (state.phase === phases.length) {
    renderResult(main);
    return;
  }

  const pct = Math.round((state.step / totalSteps) * 100);
  main.innerHTML += `
    <div class="progress-label">Etapa ${state.step + 1} de ${totalSteps}</div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    ${renderPhaseIndicator()}
  `;

  const s = currentStep();
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-step">${phases[s.phase].label}</div>
    <div class="card-question">${s.question}</div>
    <div class="card-hint">${s.hint}</div>
    ${renderInput(s)}
  `;
  main.appendChild(card);

  const nav = document.createElement("div");
  nav.className = "nav";
  nav.innerHTML = `
    ${state.step > 0
      ? `<button class="btn btn-secondary" onclick="goBack()">← Voltar</button>`
      : `<div></div>`}
    <button class="btn btn-primary" id="next-btn" onclick="goNext()">
      ${state.step === totalSteps - 1 ? "Gerar meu produto ✦" : "Continuar →"}
    </button>
  `;
  main.appendChild(nav);

  restoreAnswer(s);
  checkNextBtn();
}

function renderPhaseIndicator() {
  return `<div class="phase-indicator">
    ${phases.map((p,i) => {
      const cls = i === state.phase ? "active" : i < state.phase ? "done" : "";
      return `<div class="phase-dot ${cls}"><span class="dot"></span>${p.label}</div>`;
    }).join("")}
  </div>`;
}

function renderInput(s) {
  switch(s.type) {
    case "text":
      return `<input type="text" id="inp" placeholder="${s.placeholder}" oninput="saveAnswer()" onkeydown="if(event.key==='Enter')goNext()">`;
    case "textarea":
      return `<textarea id="inp" rows="${s.rows||4}" placeholder="${s.placeholder}" oninput="saveAnswer()"></textarea>`;
    case "chips":
      return `<div class="chips" id="chips-wrap">
        ${s.chips.map(c=>`<div class="chip" onclick="selectChip(this,'${c}')">${c}</div>`).join("")}
      </div>`;
    case "chips_text":
      return `
        <div class="chips" id="chips-wrap">
          ${s.chips.map(c=>`<div class="chip" onclick="selectChipText(this,'${c}')">${c}</div>`).join("")}
        </div>
        <input type="text" id="inp" placeholder="${s.placeholder}" oninput="saveAnswer()" style="margin-top:8px;">
      `;
    case "chips_multi":
      return `<div class="chips" id="chips-wrap">
        ${s.chips.map(c=>`<div class="chip" onclick="toggleChip(this,'${c}')">${c}</div>`).join("")}
      </div>`;
    case "scale":
      return `<div class="scale" id="scale-wrap">
        ${s.labels.map((l,i)=>`
          <button class="scale-btn" onclick="selectScale(this,${i+1})" title="${l}">
            ${i+1}
          </button>
        `).join("")}
        <span class="scale-label" id="scale-label"></span>
      </div>`;
  }
}

function saveAnswer() {
  const s = currentStep();
  const inp = document.getElementById("inp");
  if (inp) state.answers[s.key] = inp.value.trim();
  checkNextBtn();
}

function selectChip(el, val) {
  document.querySelectorAll("#chips-wrap .chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  state.answers[currentStep().key] = val;
  checkNextBtn();
}

function selectChipText(el, val) {
  document.querySelectorAll("#chips-wrap .chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  const inp = document.getElementById("inp");
  if (inp && !inp.value) inp.value = val;
  state.answers[currentStep().key] = inp ? inp.value || val : val;
  checkNextBtn();
}

function toggleChip(el, val) {
  el.classList.toggle("active");
  const active = [...document.querySelectorAll("#chips-wrap .chip.active")].map(c=>c.textContent);
  state.answers[currentStep().key] = active;
  checkNextBtn();
}

function selectScale(el, val) {
  document.querySelectorAll("#scale-wrap .scale-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  const labels = currentStep().labels;
  document.getElementById("scale-label").textContent = labels[val-1];
  state.answers[currentStep().key] = val + " — " + labels[val-1];
  checkNextBtn();
}

function restoreAnswer(s) {
  const saved = state.answers[s.key];
  if (!saved) return;
  const inp = document.getElementById("inp");
  if (s.type === "text" || s.type === "textarea") {
    if (inp) inp.value = saved;
  }
  if (s.type === "chips") {
    document.querySelectorAll("#chips-wrap .chip").forEach(c => {
      if (c.textContent === saved) c.classList.add("active");
    });
  }
  if (s.type === "chips_text") {
    document.querySelectorAll("#chips-wrap .chip").forEach(c => {
      if (inp && inp.value === c.textContent) c.classList.add("active");
    });
    if (inp) inp.value = saved;
  }
  if (s.type === "chips_multi" && Array.isArray(saved)) {
    document.querySelectorAll("#chips-wrap .chip").forEach(c => {
      if (saved.includes(c.textContent)) c.classList.add("active");
    });
  }
  if (s.type === "scale") {
    const val = parseInt(saved);
    document.querySelectorAll("#scale-wrap .scale-btn").forEach((b,i) => {
      if (i+1 === val) {
        b.classList.add("active");
        const lbl = document.getElementById("scale-label");
        if (lbl) lbl.textContent = s.labels[i];
      }
    });
  }
}

function checkNextBtn() {
  const btn = document.getElementById("next-btn");
  if (!btn) return;
  const s   = currentStep();
  const val = state.answers[s.key];
  const ok  = Array.isArray(val) ? val.length > 0 : (val && String(val).trim().length > 0);
  btn.disabled = !ok;
}

function goNext() {
  const s = currentStep();
  const inp = document.getElementById("inp");
  if (inp && (s.type === "text" || s.type === "textarea" || s.type === "chips_text")) {
    state.answers[s.key] = inp.value.trim();
  }
  if (state.step < totalSteps - 1) {
    state.step++;
    state.phase = currentStep().phase;
    window.scrollTo({ top: 0, behavior: "smooth" });
    render();
  } else {
    state.phase = phases.length;
    window.scrollTo({ top: 0, behavior: "smooth" });
    render();
  }
}

function goBack() {
  if (state.step > 0) {
    state.step--;
    state.phase = currentStep().phase;
    window.scrollTo({ top: 0, behavior: "smooth" });
    render();
  }
}

async function renderResult(main) {
  const a = state.answers;
  const nome = a.nome || "você";

  main.innerHTML = `
    <div style="text-align:center;padding:40px 0 32px;">
      <div class="header-brand">Análise concluída</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:400;color:var(--cream);line-height:1.2;margin-bottom:12px;">
        O seu mapa de produto,<br><em style="color:var(--gold2)">${nome}</em>
      </h2>
      <p style="font-size:14px;color:var(--muted);max-width:480px;margin:0 auto;">Baseado nas suas respostas, identificamos as melhores oportunidades de produto ou serviço para você.</p>
    </div>
    <div id="thinking" class="thinking">
      <div class="thinking-dots">
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
        <div class="thinking-dot"></div>
      </div>
      <div class="thinking-text">Analisando sua trajetória e construindo seu mapa de produto...</div>
    </div>
  `;

  try {
    const prompt = buildPrompt(a);
    const response = await fetch("https://criador-produto.onrender.com/api/gerar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt }),
      signal: AbortSignal.timeout(120000)
    });

    const data = await response.json();
    const raw  = data.content?.[0]?.text || "";
    let parsed;
    try {
      const clean = raw.replace(/```json|```/g, "").trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      parsed = fallback(a);
    }
    renderCards(main, parsed, a);

  } catch(err) {
    renderCards(main, fallback(a), a);
  }
}

function buildPrompt(a) {
  const formatos = Array.isArray(a.formatos) ? a.formatos.join(", ") : a.formatos;
  return `Você é um estrategista de produtos digitais e serviços. Com base no perfil a seguir, gere uma análise estruturada em JSON.

PERFIL:
- Nome: ${a.nome}
- Área de atuação: ${a.area}
- Maior conquista: ${a.conquista}
- Problema que superou: ${a.transformacao}
- O que sabe fazer bem: ${a.sabe}
- Nível de autoridade (1–5): ${a.nivel}
- Resultados concretos: ${a.resultado_concreto}
- Público que quer aprender: ${a.quem_aprende}
- Público que quer chegar onde chegou: ${a.quem_chegar}
- Público que contrataria: ${a.quem_contratar}
- Formatos preferidos: ${formatos}
- Disponibilidade semanal: ${a.tempo}
- Faixa de preço imaginada: ${a.preco}

Responda APENAS com JSON válido neste formato (sem markdown, sem explicação fora do JSON):
{
  "posicionamento": "Frase de posicionamento clara de até 2 linhas que define quem é essa pessoa e o que ela entrega",
  "autoridade": "Parágrafo curto explicando em que essa pessoa é autoridade e por quê as pessoas devem confiar nela. Cite elementos das respostas.",
  "publicos": [
    {"tipo": "Quem quer aprender", "descricao": "Perfil detalhado desse público e a dor específica que essa pessoa resolve"},
    {"tipo": "Quem quer chegar lá", "descricao": "..."},
    {"tipo": "Quem quer contratar", "descricao": "..."}
  ],
  "produtos": [
    {
      "nome": "Nome do produto/serviço sugerido",
      "tipo": "Tipo (ex: Curso online, Mentoria, Consultoria...)",
      "descricao": "O que entrega e para quem. 2-3 frases.",
      "formato": "Como seria entregue",
      "preco_sugerido": "Faixa de preço recomendada",
      "prioridade": "Alta/Média",
      "por_que": "Por que esse produto faz sentido para esse perfil específico"
    }
  ],
  "proximos_passos": [
    "Passo concreto 1",
    "Passo concreto 2",
    "Passo concreto 3",
    "Passo concreto 4"
  ],
  "frase_ancora": "Uma frase poderosa que resume a transformação que essa pessoa oferece — pode ser usada como tagline"
}`;
}

function fallback(a) {
  const nome = a.nome || "você";
  const area = a.area || "sua área";
  return {
    posicionamento: `${nome} transforma experiência real em ${area} em resultados concretos para quem ainda está no caminho.`,
    autoridade: `Com vivência prática e resultados comprovados, ${nome} carrega um repertório que poucos dominam. A autoridade não vem de título — vem de ter passado pelo processo e saído do outro lado.`,
    publicos: [
      { tipo: "Quem quer aprender", descricao: "Pessoas que querem aprender de quem já fez, com método prático e linguagem acessível." },
      { tipo: "Quem quer chegar lá", descricao: "Profissionais e empreendedores que enxergam na trajetória de " + nome + " o caminho que querem trilhar — e precisam de atalhos." },
      { tipo: "Quem quer contratar", descricao: "Empresas e pessoas que preferem pagar por quem resolve, em vez de aprender a fazer sozinhos." }
    ],
    produtos: [
      {
        nome: "Programa Transformação em " + (area.split("/")[0] || area),
        tipo: "Mentoria em grupo",
        descricao: "Programa estruturado que guia o aluno desde o zero até o resultado, com método, comunidade e acompanhamento.",
        formato: "Encontros ao vivo + material de apoio + grupo exclusivo",
        preco_sugerido: a.preco || "R$ 997–3.000",
        prioridade: "Alta",
        por_que: "Combina os formatos que você preferiu com o perfil do seu público principal."
      },
      {
        nome: "Consultoria Individual",
        tipo: "Serviço de consultoria",
        descricao: "Sessões individuais de diagnóstico e estratégia, entregando soluções personalizadas.",
        formato: "Sessões online de 1h–2h",
        preco_sugerido: "Acima de R$ 997",
        prioridade: "Alta",
        por_que: "Permite começar a gerar renda imediatamente, sem precisar de produto estruturado."
      }
    ],
    proximos_passos: [
      "Escolha 1 público específico e escreva uma frase descrevendo exatamente quem é e qual dor você resolve",
      "Faça sua primeira venda — mesmo que seja informalmente, para alguém da sua rede",
      "Documente o processo que você usa para gerar o resultado que já obteve",
      "Defina seu canal principal de distribuição (Instagram, LinkedIn, WhatsApp) e comece a publicar"
    ],
    frase_ancora: "Você já fez o caminho. Agora é hora de encurtar esse caminho para quem vem atrás."
  };
}

function renderCards(main, data, a) {
  const thinking = document.getElementById("thinking");
  if (thinking) thinking.remove();

  const nome = a.nome || "você";

  const ancora = document.createElement("div");
  ancora.className = "result-section";
  ancora.style.background = "linear-gradient(135deg, rgba(27,58,107,.25), rgba(200,149,42,.08))";
  ancora.innerHTML = `
    <div style="padding:28px 32px;text-align:center;">
      <div style="font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;opacity:.8;">Sua frase âncora</div>
      <div style="font-family:'Playfair Display',serif;font-size:clamp(1.1rem,2.5vw,1.5rem);color:var(--cream);line-height:1.5;font-style:italic;">"${data.frase_ancora}"</div>
      <button class="copy-btn" style="margin:16px auto 0;" onclick="copy('${escHtml(data.frase_ancora)}', this)">⊕ Copiar frase</button>
    </div>
  `;
  main.appendChild(ancora);

  addCard(main, "✦", "Posicionamento", `<p>${data.posicionamento}</p><p style="margin-top:12px;">${data.autoridade}</p>`, data.posicionamento);

  const pubHtml = data.publicos.map(p => `
    <div style="margin-bottom:14px;padding:14px 16px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);">
      <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">${p.tipo}</div>
      <div style="font-size:14px;color:#b8b0a0;line-height:1.7;">${p.descricao}</div>
    </div>
  `).join("");
  addCard(main, "◎", "Seus Públicos", pubHtml, null);

  data.produtos.forEach((prod, i) => {
    const sec = document.createElement("div");
    sec.className = "result-section";
    sec.style.animationDelay = (i * 80) + "ms";
    sec.innerHTML = `
      <div class="result-header">
        <div class="result-icon">${i===0?"★":"◈"}</div>
        <div>
          <div class="result-title">${prod.nome}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${prod.tipo} · <span style="color:${prod.prioridade==='Alta'?'var(--gold)':'var(--muted)'}">Prioridade ${prod.prioridade}</span></div>
        </div>
      </div>
      <div class="result-body">
        <p>${prod.descricao}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;">
          <div style="padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
            <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Formato</div>
            <div style="font-size:13px;color:var(--cream);">${prod.formato}</div>
          </div>
          <div style="padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);">
            <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Preço sugerido</div>
            <div style="font-size:13px;color:var(--gold);">${prod.preco_sugerido}</div>
          </div>
        </div>
        <div style="margin-top:14px;padding:12px 14px;background:rgba(200,149,42,.05);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;">
          <div style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;opacity:.8;">Por que faz sentido para você</div>
          <div style="font-size:13px;color:#b8b0a0;">${prod.por_que}</div>
        </div>
      </div>
    `;
    main.appendChild(sec);
  });

  const passosHtml = `<ol style="padding-left:20px;">
    ${data.proximos_passos.map(p=>`<li style="margin-bottom:10px;">${p}</li>`).join("")}
  </ol>`;
  addCard(main, "→", "Próximos Passos", passosHtml, null);

  const cta = document.createElement("div");
  cta.className = "final-cta";
  cta.innerHTML = `
    <div style="font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);margin-bottom:12px;">✦</div>
    <h2>Agora é hora de construir</h2>
    <p>Você tem o mapa. O próximo passo é dar o primeiro movimento real — não o perfeito, o real.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="restart()">Refazer para outro produto</button>
      <button class="btn btn-secondary" onclick="copyAll()">Copiar análise completa</button>
    </div>
  `;
  main.appendChild(cta);
}

function addCard(main, icon, title, bodyHtml, copyText) {
  const sec = document.createElement("div");
  sec.className = "result-section";
  sec.innerHTML = `
    <div class="result-header">
      <div class="result-icon" style="font-family:'Playfair Display',serif;">${icon}</div>
      <div class="result-title">${title}</div>
    </div>
    <div class="result-body">
      ${bodyHtml}
      ${copyText ? `<button class="copy-btn" onclick="copy('${escHtml(copyText)}', this)">⊕ Copiar</button>` : ""}
    </div>
  `;
  main.appendChild(sec);
}

function escHtml(s) {
  return (s||"").replace(/'/g, "\\'").replace(/"/g,"&quot;").replace(/\n/g," ");
}

function copy(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = "✓ Copiado";
    setTimeout(() => btn.textContent = orig, 1800);
  });
}

function copyAll() {
  const a = state.answers;
  const text = `MAPA DE PRODUTO — A BASE DA RIQUEZA
Nome: ${a.nome}
Área: ${a.area}
Conquista: ${a.conquista}
Transformação: ${a.transformacao}
O que sabe: ${a.sabe}
Resultados: ${a.resultado_concreto}
Público (aprende): ${a.quem_aprende}
Público (chegar): ${a.quem_chegar}
Público (contratar): ${a.quem_contratar}
Formatos: ${Array.isArray(a.formatos)?a.formatos.join(", "):a.formatos}
Tempo: ${a.tempo}
Preço: ${a.preco}`;
  navigator.clipboard.writeText(text).then(() => {
    alert("Análise copiada para a área de transferência!");
  });
}

function restart() {
  state.phase = 0;
  state.step  = 0;
  state.answers = {};
  window.scrollTo({ top: 0, behavior: "smooth" });
  render();
}

render();
</script>
</body>
</html>
